<!DOCTYPE html>
<html>
<head>
    <title>Dumclaw Terminal</title>
    <style>
        body {
            font-family: monospace;
            background: #111;
            color: #0f0;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            gap: 10px;
            padding: 10px;
        }
        .terminal {
            flex: 2;
            display: flex;
            flex-direction: column;
        }
        .input-section {
            margin-bottom: 10px;
        }
        #cmd {
            width: 400px;
            padding: 5px;
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
        }
        #log {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #0f0;
            padding: 6px;
            background: #000;
        }
        .log-entry {
            border: 1px solid #0f0;
            padding: 4px;
            margin-bottom: 6px;
            word-wrap: break-word;
        }
        .status-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .status-box {
            border: 1px solid #0f0;
            padding: 6px;
            background: #000;
        }
        .status-box h3 {
            margin: 0;
            padding: 0;
            color: #0f0;
        }
        .status-content {
            height: 150px;
            overflow: auto;
            margin-top: 5px;
        }
        .realtime-events {
            height: 230px;
            overflow: auto;
            border: 1px solid #0f0;
            padding: 6px;
            background: #000;
        }
        .realtime-event {
            margin-bottom: 4px;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }
        .realtime-event .time {
            color: #0ff;
            font-size: 11px;
            margin-right: 5px;
        }
        .realtime-event .type {
            color: #ff0;
            font-weight: bold;
            margin-right: 5px;
        }
        .realtime-event .data {
            color: #0f0;
            font-size: 11px;
        }
        .tool-decision {
            background: #002;
            border: 1px solid #0f0;
            padding: 4px;
            margin-bottom: 2px;
        }
        .tool-decision .decision {
            color: #ff0;
            font-weight: bold;
        }
        .tool-decision .time {
            color: #0ff;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <h2 style="padding: 10px;">Dumclaw Terminal</h2>

    <div class="container">
        <!-- TERMINAL -->
        <div class="terminal">
            <div class="input-section">
                <input id="cmd" placeholder="Type message here...">
                <button onclick="send()">Send</button>
            </div>
            <div id="log" class="log-section">
                <!-- Log entries will be added here -->
            </div>
        </div>

        <!-- STATUS COLUMN -->
        <div class="status-column">
            <div class="status-box">
                <h3>Relay Status</h3>
                <pre id="relays" class="status-content">
                    Checking relay status...
                </pre>
            </div>

            <div class="status-box">
                <h3>Bot Monitor</h3>
                <div id="events" class="realtime-events">
                    <!-- Realtime events will be displayed here -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const cmd = document.getElementById('cmd');
        const log = document.getElementById('log');
        const events = document.getElementById('events');
        const relays = document.getElementById('relays');

        // Socket.IO connection
        const socket = io({
            autoConnect: true,
            transports: ['websocket']
        });

        // Terminal output
        function addLog(text) {
            const box = document.createElement('div');
            box.className = 'log-entry';
            box.textContent = text;
            log.prepend(box);
        }

        // Send command
        async function send() {
            let msg = cmd.value.trim();
            if (!msg) return;

            addLog('> ' + msg);

            try {
                let r = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });

                let data = await r.json();
                addLog(data.reply);
            } catch (e) {
                addLog('[error] ' + e.message);
            }

            cmd.value = '';
            cmd.focus();
        }

        // Handle realtime events from Socket.IO
        socket.on('realtime_event', function(data) {
            const eventDiv = document.createElement('div');
            eventDiv.className = 'realtime-event';
            eventDiv.innerHTML = `
                <span class="time">${data.time}</span>
                <span class="type">${data.type}</span>
                <span class="data">${JSON.stringify(data.data)}</span>
            `;
            events.prepend(eventDiv);
        });

        // Handle tool decision events
        socket.on('tool_decision_event', function(data) {
            const decisionDiv = document.createElement('div');
            decisionDiv.className = 'tool-decision';
            decisionDiv.innerHTML = `
                <div class="decision">Decision: ${data.decision}</div>
                <div class="time">${data.time}</div>
            `;
            events.prepend(decisionDiv);
        });

        // Poll for initial data
        async function pollData() {
            try {
                // Get initial events
                let r = await fetch('/events');
                let data = await r.json();
                displayEvents(data);

                // Get relay status
                r = await fetch('/status');
                data = await r.json();
                displayStatus(data);
            } catch (e) {
                console.log('Initial poll error:', e);
            }
        }

        function displayEvents(events) {
            events.slice(-20).reverse().forEach(event => {
                const eventDiv = document.createElement('div');
                eventDiv.className = 'realtime-event';
                eventDiv.innerHTML = `
                    <span class="time">${event.time}</span>
                    <span class="type">${event.type}</span>
                    <span class="data">${JSON.stringify(event.data)}</span>
                `;
                events.prepend(eventDiv);
            });
        }

        function displayStatus(status) {
            relays.textContent = `Bot: ${status.bot}
Status: ${status.status}`;
        }

        // Event listeners
        cmd.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                send();
            }
        });

        // Initialize
        pollData();
        cmd.focus();
    </script>
</body>
</html>
