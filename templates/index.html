<!DOCTYPE html>
<html>
<body style="font-family: monospace; background:#111; color:#0f0;">

<h2>Dumclaw Terminal</h2>

<input id="cmd" style="width:400px;">
<button onclick="send()">send</button>

<pre id="log"></pre>

<h3>Relay Status</h3>
<pre id="relays"></pre>

<h3>Bot Monitor</h3>
<pre id="events"></pre>

<script>

const cmd = document.getElementById("cmd")
const log = document.getElementById("log")
const events = document.getElementById("events")
const relays = document.getElementById("relays")

async function send(){

    let msg = cmd.value.trim()
    if(!msg) return

    try{

        let r = await fetch("/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({message:msg})
        })

        let data = await r.json()

        log.textContent += "\n> " + msg + "\n" + data.reply + "\n"

        log.scrollTop = log.scrollHeight

    }catch(e){

        log.textContent += "\n[error] "+e+"\n"

    }

    cmd.value = ""
    cmd.focus()

}


async function updateEvents(){

    try{

        let r = await fetch("/events")
        let data = await r.json()

        events.textContent = JSON.stringify(data,null,2)

    }catch(e){

        events.textContent = "event fetch error"

    }

}


async function updateRelays(){

    try{

        let r = await fetch("/relays")
        let data = await r.json()

        let out = ""

        for(let k in data){

            if(data[k] === "connected"){
                out += "✔ " + k + "\n"
            }else{
                out += "✖ " + k + "\n"
            }

        }

        relays.textContent = out

    }catch(e){

        relays.textContent = "relay status error"

    }

}


setInterval(()=>{

    updateEvents()
    updateRelays()

},1000)


cmd.addEventListener("keydown", function(e){

    if(e.key === "Enter"){
        send()
    }

})


cmd.focus()

</script>

</body>
</html>
