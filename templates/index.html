<!DOCTYPE html>
<html>
<body style="font-family: monospace; background:#111; color:#0f0; margin:0;">

<h2 style="padding:10px;">Dumclaw Terminal</h2>

<div style="display:flex; gap:10px; padding:10px;">

<!-- TERMINAL -->
<div style="flex:2; display:flex; flex-direction:column;">

<div>
<input id="cmd" style="width:400px;">
<button onclick="send()">send</button>
</div>

<div id="log" style="
margin-top:10px;
height:400px;
overflow-y:auto;
border:1px solid #0f0;
padding:6px;
"></div>

</div>

<!-- STATUS COLUMN -->
<div style="flex:1; display:flex; flex-direction:column; gap:10px;">

<div>
<h3>Relay Status</h3>
<pre id="relays" style="
height:150px;
overflow:auto;
border:1px solid #0f0;
padding:6px;
"></pre>
</div>

<div>
<h3>Bot Monitor</h3>
<div id="events" style="
height:230px;
overflow:auto;
border:1px solid #0f0;
padding:6px;
"></div>
</div>

</div>

</div>

<script>

const cmd = document.getElementById("cmd")
const log = document.getElementById("log")
const events = document.getElementById("events")
const relays = document.getElementById("relays")


/* TERMINAL OUTPUT */

function addLog(text){

    const box = document.createElement("div")

    box.style.border = "1px solid #0f0"
    box.style.padding = "4px"
    box.style.marginBottom = "6px"
    box.textContent = text

    log.prepend(box)

}


/* SEND COMMAND */

async function send(){

    let msg = cmd.value.trim()
    if(!msg) return

    addLog("> " + msg)

    try{

        let r = await fetch("/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({message:msg})
        })

        let data = await r.json()

        addLog(data.reply)

    }catch(e){

        addLog("[error] " + e)

    }

    cmd.value = ""
    cmd.focus()

}


/* EVENTS MONITOR */

async function updateEvents(){

    try{

        let r = await fetch("/events")
        let data = await r.json()

        let out = ""

        if(Array.isArray(data)){

            data.slice(-50).reverse().forEach(e=>{
                out += JSON.stringify(e) + "\n"
            })

        }else{

            out = JSON.stringify(data,null,2)

        }

        events.textContent = out

    }catch(e){

        events.textContent = "event fetch error"

    }

}


/* RELAY STATUS */

async function updateRelays(){

    try{

        let r = await fetch("/relays")
        let data = await r.json()

        let out = ""

        for(let k in data){

            if(data[k] === "connected"){
                out += "✔ " + k + "\n"
            }else{
                out += "✖ " + k + "\n"
            }

        }

        relays.textContent = out

    }catch(e){

        relays.textContent = "relay status error"

    }

}


/* POLL SYSTEM */

setInterval(()=>{

    updateEvents()
    updateRelays()

},1000)


/* ENTER TO SEND */

cmd.addEventListener("keydown", function(e){

    if(e.key === "Enter"){
        send()
    }

})


cmd.focus()

</script>

</body>
</html>
